<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CloudForce — Návrhář podpisů</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{--bg:#f1f4f9;--surface:#fff;--surface2:#f8fafc;--border:#e2e8f0;--accent:#23457a;--green:#1fc09f;--danger:#ef4444;--warn:#f59e0b;--text:#1e293b;--muted:#64748b;--radius:8px;--shadow:0 1px 3px rgba(0,0,0,.08);}
html,body{height:100%;overflow:hidden;}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:13px;color:var(--text);background:var(--bg);display:flex;flex-direction:column;}
.hdr{background:var(--accent);color:#fff;padding:0 16px;height:48px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hdr-brand{display:flex;align-items:center;gap:10px;}
.hdr-logo{font-size:15px;font-weight:700;letter-spacing:-.02em;}
.hdr-logo span{color:var(--green);}
.hdr-sep{width:1px;height:20px;background:rgba(255,255,255,.25);}
.hdr-title{font-size:12px;opacity:.7;}
.hdr-actions{display:flex;gap:8px;}
.btn{padding:6px 12px;border-radius:var(--radius);border:none;cursor:pointer;font-family:inherit;font-size:12px;font-weight:600;transition:all .15s;}
.btn-ghost{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.25);}
.btn-ghost:hover{background:rgba(255,255,255,.25);}
.btn-primary{background:var(--green);color:#fff;}
.btn-primary:hover{filter:brightness(1.1);}
.btn-danger{background:var(--danger);color:#fff;}
.btn-danger:hover{filter:brightness(1.1);}
.btn-sm{padding:4px 8px;font-size:11px;}
.main{flex:1;display:flex;overflow:hidden;}
.left{width:390px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.skin-list-wrap{padding:12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.skin-list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.section-title{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.skin-list{display:flex;flex-direction:column;gap:4px;max-height:120px;overflow-y:auto;}
.skin-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:var(--radius);border:1px solid var(--border);cursor:pointer;transition:all .12s;background:var(--surface2);}
.skin-item:hover{border-color:var(--accent);}
.skin-item.active{border-color:var(--accent);background:rgba(35,69,122,.06);}
.skin-item-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.skin-item-name{flex:1;font-weight:500;font-size:12px;}
.skin-item-layout{font-size:10px;color:var(--muted);}
.skin-item-actions{display:flex;gap:4px;opacity:0;transition:opacity .12s;}
.skin-item:hover .skin-item-actions{opacity:1;}
.icon-btn{background:none;border:none;cursor:pointer;padding:2px 4px;border-radius:4px;color:var(--muted);font-size:12px;}
.icon-btn:hover{background:var(--border);color:var(--text);}
.icon-btn.del:hover{color:var(--danger);background:#fef2f2;}
.editor{flex:1;overflow-y:auto;padding:12px;}
.editor-placeholder{color:var(--muted);text-align:center;padding:40px 20px;font-size:12px;}
.accordion{border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;overflow:hidden;}
.acc-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;background:var(--surface2);user-select:none;}
.acc-header:hover{background:#eef2f8;}
.acc-title{font-size:11px;font-weight:700;color:var(--text);}
.acc-arrow{font-size:10px;color:var(--muted);transition:transform .15s;}
.acc-header.open .acc-arrow{transform:rotate(180deg);}
.acc-body{padding:10px 12px;display:none;border-top:1px solid var(--border);background:var(--surface);}
.acc-body.open{display:block;}
.field{margin-bottom:9px;}
.field:last-child{margin-bottom:0;}
.field-row{display:flex;gap:8px;}
.field-row .field{flex:1;}
label{display:block;font-size:10px;font-weight:600;color:var(--muted);margin-bottom:3px;}
input[type=text],input[type=url],input[type=number],input[type=color],input[type=date],select{width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:inherit;font-size:12px;padding:5px 8px;outline:none;transition:border-color .15s;}
input[type=color]{padding:2px 4px;height:28px;cursor:pointer;}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(35,69,122,.1);}
input[type=checkbox]{width:14px;height:14px;cursor:pointer;accent-color:var(--accent);}
.checkbox-row{display:flex;align-items:center;gap:6px;margin-bottom:6px;}
.checkbox-row label{margin:0;font-size:12px;font-weight:400;color:var(--text);cursor:pointer;}
.layout-btns{display:flex;gap:6px;}
.layout-btn{flex:1;padding:7px 4px;border:2px solid var(--border);border-radius:6px;background:var(--surface2);cursor:pointer;text-align:center;font-size:10px;font-weight:600;color:var(--muted);transition:all .12s;}
.layout-btn:hover{border-color:var(--accent);}
.layout-btn.active{border-color:var(--accent);background:rgba(35,69,122,.06);color:var(--accent);}
.layout-icon{font-size:16px;display:block;margin-bottom:3px;}
.menu-item,.lang-item{display:flex;gap:5px;align-items:center;margin-bottom:5px;}
.menu-item input{flex:1;}
.menu-item input:first-of-type{flex:0 0 80px;}
.dropzone{border:1.5px dashed var(--border);border-radius:6px;padding:14px;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:rgba(35,69,122,.04);color:var(--accent);}
.logo-preview{max-width:140px;max-height:50px;margin:8px auto 0;display:none;}
.social-chk{display:flex;align-items:center;gap:6px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;margin-bottom:5px;cursor:pointer;background:var(--surface2);}
.social-chk .badge{width:20px;height:20px;border-radius:5px;color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;}
.social-chk .nm{flex:1;font-size:12px;}
.editor-actions{padding:12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;}
.editor-actions .btn{flex:1;}
.right{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.preview-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface);flex-shrink:0;}
.ptab{padding:10px 14px;font-size:11px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;}
.ptab.active{color:var(--accent);border-bottom-color:var(--green);}
.right-content{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.preview-pane,.code-pane{flex:1;overflow:auto;padding:20px;display:none;}
.preview-pane.active,.code-pane.active{display:block;}
.testdata{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:10px 14px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.testdata span{font-size:10px;text-transform:uppercase;font-weight:700;color:var(--muted);letter-spacing:.06em;}
.testdata input{flex:1;min-width:90px;background:#fff;border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:12px;font-family:inherit;outline:none;}
.testdata input:focus{border-color:var(--accent);}
.preview-device{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:24px;max-width:600px;box-shadow:var(--shadow);}
.preview-sig-divider{border:none;border-top:1px dashed var(--border);margin:16px 0;}
.code-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
pre#codeOut{background:#1e293b;color:#e2e8f0;border-radius:var(--radius);padding:14px;font-family:'Courier New',monospace;font-size:11px;line-height:1.6;white-space:pre-wrap;word-break:break-all;overflow:auto;}
.toast{position:fixed;bottom:16px;right:16px;background:#1e293b;color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:12px;font-weight:500;transform:translateY(20px);opacity:0;transition:all .2s;pointer-events:none;z-index:99;}
.toast.show{transform:translateY(0);opacity:1;}
/* validation */
.valbar{margin-bottom:12px;border-radius:var(--radius);padding:10px 14px;font-size:12px;display:none;}
.valbar.ok{background:#ecfdf5;border:1px solid #6ee7b7;color:#047857;display:block;}
.valbar.warn{background:#fffbeb;border:1px solid #fcd34d;color:#92400e;display:block;}
.valbar ul{margin:6px 0 0 18px;}
/* modal */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;z-index:100;}
.modal-bg.show{display:flex;}
.modal{background:#fff;border-radius:12px;width:90%;max-width:640px;max-height:80vh;overflow:auto;padding:20px;}
.modal h2{font-size:15px;margin-bottom:4px;}
.modal p{font-size:12px;color:var(--muted);margin-bottom:14px;}
.tmpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.tmpl-card{border:2px solid var(--border);border-radius:8px;padding:10px;cursor:pointer;transition:all .15s;}
.tmpl-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow);}
.tmpl-prev{height:54px;border-radius:6px;margin-bottom:8px;overflow:hidden;}
.tmpl-name{font-size:12px;font-weight:600;}
.tmpl-sub{font-size:10px;color:var(--muted);}
.modal-close{float:right;cursor:pointer;color:var(--muted);font-size:18px;border:none;background:none;}
</style>
</head>
<body>

<div class="hdr">
  <div class="hdr-brand">
    <div class="hdr-logo">Cloud<span>Force</span></div>
    <div class="hdr-sep"></div>
    <div class="hdr-title">Návrhář podpisů — Admin</div>
  </div>
  <div class="hdr-actions">
    <label class="btn btn-ghost" style="cursor:pointer;">📂 Import<input type="file" accept=".json" id="importFile" style="display:none;" onchange="importSkins(this)"></label>
    <button class="btn btn-primary" onclick="exportSkins()">💾 Export skins.json</button>
  </div>
</div>

<div class="main">
  <div class="left">
    <div class="skin-list-wrap">
      <div class="skin-list-header">
        <div class="section-title">Skiny</div>
        <button class="btn btn-sm btn-primary" onclick="openTemplates()">+ Nový</button>
      </div>
      <div class="skin-list" id="skinList"></div>
    </div>
    <div class="editor" id="editor"><div class="editor-placeholder">👈 Vyberte nebo vytvořte skin</div></div>
    <div class="editor-actions" id="editorActions" style="display:none;">
      <button class="btn btn-primary" onclick="saveSkin()">✓ Uložit skin</button>
      <button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border);" onclick="validateCurrent()">🔍 Kontrola</button>
      <button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border);" onclick="resetSkin()" title="Zahodit změny">↺</button>
      <button class="btn btn-danger btn-sm" onclick="deleteSkin()">🗑</button>
    </div>
  </div>

  <div class="right">
    <div class="preview-tabs">
      <div class="ptab active" onclick="showPane('preview')">👁 Náhled</div>
      <div class="ptab" onclick="showPane('code')">{ } HTML kód</div>
    </div>
    <div class="right-content">
      <div class="preview-pane active" id="panePreview">
        <div id="valbar" class="valbar"></div>
        <div class="testdata">
          <span>Test:</span>
          <input id="td-name" value="Martin Maryška" placeholder="Jméno" oninput="liveUpdate()">
          <input id="td-title" value="Developer" placeholder="Pozice" oninput="liveUpdate()">
          <input id="td-phone" value="+420 721 736 789" placeholder="Telefon" oninput="liveUpdate()">
          <input id="td-email" value="martin@cloudforce.cz" placeholder="Email" oninput="liveUpdate()">
          <input id="td-linkedin" value="martin-maryska" placeholder="LinkedIn user" oninput="liveUpdate()">
          <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);text-transform:none;letter-spacing:0;"><input type="checkbox" id="td-dark" onchange="liveUpdate()" style="width:auto;">🌙 dark</label>
        </div>
        <div class="preview-device">
          <div style="font-size:13px;color:var(--text);line-height:1.6;margin-bottom:16px;color:#94a3b8;">Dobrý den,<br>děkuji za Vaši zprávu, ozvu se obratem.<br>S pozdravem,</div>
          <div class="preview-sig-divider"></div>
          <div id="previewOut"><em style="color:#999;font-size:12px;">Vyberte skin...</em></div>
        </div>
      </div>
      <div class="code-pane" id="paneCode">
        <div class="code-toolbar">
          <span style="font-size:11px;color:var(--muted);">Vygenerovaný HTML podpisu</span>
          <button class="btn btn-sm btn-primary" onclick="copyCode()">📋 Kopírovat</button>
        </div>
        <pre id="codeOut">// Vyberte skin...</pre>
      </div>
    </div>
  </div>
</div>

<!-- TEMPLATE GALLERY MODAL -->
<div class="modal-bg" id="tmplModal">
  <div class="modal">
    <button class="modal-close" onclick="closeTemplates()">✕</button>
    <h2>Vyberte šablonu</h2>
    <p>Začněte z hotové šablony a upravte ji podle sebe.</p>
    <div class="tmpl-grid" id="tmplGrid"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="lib-qrcode.js"></script>
<script src="signature-renderer.js"></script>
<script>
let skins=[], currentId=null;
const LAYOUTS=[{id:'two-column',icon:'⬛⬛',label:'Dva sloupce'},{id:'stacked',icon:'▬▬',label:'Jeden sloupec'},{id:'card',icon:'🎴',label:'Karta'}];
const SOC=[['linkedin','in','#0A66C2'],['x','X','#000'],['facebook','f','#1877F2'],['instagram','IG','#E4405F'],['github','GH','#181717'],['youtube','YT','#FF0000']];

function baseSkin(){return{id:'skin_'+Date.now(),name:'Nový skin',layout:'two-column',default:false,disclaimer:'',
  styles:{primaryColor:'#23457a',accentColor:'#1fc09f',fontFamily:"'Segoe UI', Arial, Helvetica, sans-serif",nameSize:16,nameBold:true,nameUppercase:true,nameColor:'#23457a',titleSize:14,titleItalic:true,titleColor:'#000000',contactSize:14,contactColor:'#23457a',dividerColor:'#1fc09f',dividerWidth:58,separatorColor:'#bfc0c5',cardHeaderBg:'#23457a',cardHeaderTextColor:'#ffffff',cardBodyBg:'#f8fafc',darkBg:'',borderColor:'',photoSize:64,photoRound:true},
  company:{logoUrl:'https://cloudforce.cz/wp-content/uploads/2026/05/logo-cloudforce.png',logoWidth:200,logoLink:'https://cloudforce.cz/',logoInvert:false,websiteUrl:'https://cloudforce.cz/',websiteLabel:'www.cloudforce.cz',phoneIconUrl:'https://cloudforce.cz/wp-content/uploads/2026/05/icon-phone.png',emailIconUrl:'https://cloudforce.cz/wp-content/uploads/2026/05/icon-email.png',webIconUrl:'https://cloudforce.cz/wp-content/uploads/2026/05/icon-web.png'},
  blocks:{name:true,pronouns:true,title:true,department:true,divider:true,logo:true,phone:true,mobile:true,email:true,web:true,address:true,menu:true,photo:false,social:true,qr:false},
  menu:{enabled:true,items:[{label:'M365',url:'https://cloudforce.cz/microsoft-365/'},{label:'LICENCE',url:'https://cloudforce.cz/produkt-kategorie/licence-office-365/'},{label:'APLIKACE',url:'https://cloudforce.cz/produkt-kategorie/aplikace/'},{label:'SLUŽBY',url:'https://cloudforce.cz/produkt-kategorie/sluzby/'}]},
  social:{enabled:true,platforms:['linkedin','x','github']},
  qr:{enabled:false},
  banner:{enabled:false,imageUrl:'',link:'',alt:'',width:500,startDate:'',endDate:''},
  darkVariant:{enabled:false,styles:{}},
  translations:{}
};}

/* ---------- TEMPLATES ---------- */
const TEMPLATES=[
  {name:'CloudForce klasik',sub:'Dva sloupce, zelená čára',apply:s=>s},
  {name:'Tmavý',sub:'Tmavé pozadí',apply:s=>{s.name='Tmavý';s.layout='stacked';Object.assign(s.styles,{nameColor:'#fff',darkBg:'#111827',accentColor:'#6366f1',titleColor:'#6366f1',contactColor:'#9ca3af',dividerColor:'#6366f1'});s.company.logoInvert=true;s.blocks.menu=false;s.blocks.photo=true;return s;}},
  {name:'Minimalistický',sub:'Levý zelený okraj',apply:s=>{s.name='Minimalistický';s.layout='stacked';Object.assign(s.styles,{nameUppercase:false,nameColor:'#111827',titleColor:'#6b7280',contactColor:'#374151',borderColor:'#059669',accentColor:'#059669',dividerWidth:0});s.blocks.menu=false;s.blocks.social=false;return s;}},
  {name:'Karta výrazná',sub:'Barevná hlavička',apply:s=>{s.name='Karta';s.layout='card';Object.assign(s.styles,{cardHeaderBg:'#be123c',cardHeaderTextColor:'#fff',accentColor:'#f59e0b',primaryColor:'#be123c'});s.blocks.menu=false;return s;}},
  {name:'S fotem',sub:'Kulaté foto u jména',apply:s=>{s.name='S fotem';s.blocks.photo=true;return s;}},
  {name:'S QR vizitkou',sub:'QR kód vCard',apply:s=>{s.name='S QR';s.blocks.qr=true;s.qr.enabled=true;return s;}}
];
function openTemplates(){
  const g=document.getElementById('tmplGrid');
  g.innerHTML=TEMPLATES.map((t,i)=>{const s=t.apply(baseSkin());const pc=s.styles.primaryColor,ac=s.styles.accentColor;
    return `<div class="tmpl-card" onclick="useTemplate(${i})"><div class="tmpl-prev" style="background:${pc};"><div style="padding:8px 10px;"><div style="height:7px;width:60%;background:${ac};border-radius:2px;margin-bottom:5px;"></div><div style="height:4px;width:45%;background:rgba(255,255,255,.4);border-radius:1px;margin-bottom:3px;"></div><div style="height:4px;width:70%;background:rgba(255,255,255,.4);border-radius:1px;"></div></div></div><div class="tmpl-name">${t.name}</div><div class="tmpl-sub">${t.sub}</div></div>`;
  }).join('');
  document.getElementById('tmplModal').classList.add('show');
}
function closeTemplates(){document.getElementById('tmplModal').classList.remove('show');}
function useTemplate(i){const s=TEMPLATES[i].apply(baseSkin());s.id='skin_'+Date.now();skins.push(s);saveState();closeTemplates();selectSkin(s.id);}

/* ---------- PERSIST ---------- */
function loadState(){
  const saved=localStorage.getItem('cf_admin_skins');
  if(saved){try{skins=JSON.parse(saved);currentId=skins[0]?.id||null;renderAll();return;}catch(e){}}
  fetch('skins.json').then(r=>r.json()).then(d=>{skins=d;currentId=skins[0]?.id||null;saveState();renderAll();}).catch(()=>{skins=[baseSkin()];skins[0].name='CloudForce Original';currentId=skins[0].id;saveState();renderAll();});
}
function saveState(){localStorage.setItem('cf_admin_skins',JSON.stringify(skins));}

/* ---------- LIST ---------- */
function renderSkinList(){
  const el=document.getElementById('skinList');
  if(!skins.length){el.innerHTML='<div style="color:var(--muted);font-size:11px;padding:8px 0;">Žádné skiny.</div>';return;}
  el.innerHTML=skins.map(s=>`<div class="skin-item${s.id===currentId?' active':''}" onclick="selectSkin('${s.id}')">
    <div class="skin-item-dot" style="background:${s.styles?.accentColor||'#999'};"></div>
    <div class="skin-item-name">${esc(s.name)}${s.default?' <span style="color:#f59e0b;" title="Výchozí">★</span>':''}</div>
    <div class="skin-item-layout">${LAYOUTS.find(l=>l.id===s.layout)?.label||s.layout}</div>
    <div class="skin-item-actions">
      <button class="icon-btn" title="Nastavit jako výchozí" onclick="event.stopPropagation();setDefault('${s.id}')">${s.default?'★':'☆'}</button>
      <button class="icon-btn" title="Exportovat skin" onclick="event.stopPropagation();exportOne('${s.id}')">⬇</button>
      <button class="icon-btn" title="Duplikovat" onclick="event.stopPropagation();dupeSkin('${s.id}')">⧉</button>
      <button class="icon-btn del" title="Smazat" onclick="event.stopPropagation();deleteSkinById('${s.id}')">✕</button>
    </div></div>`).join('');
}
function selectSkin(id){currentId=id;renderAll();}
function setDefault(id){skins.forEach(s=>s.default=(s.id===id));saveState();renderSkinList();showToast('★ Výchozí skin nastaven.');}
function exportOne(id){const s=skins.find(x=>x.id===id);if(!s)return;const blob=new Blob([JSON.stringify([s],null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='skin-'+(s.name||'export').replace(/\s+/g,'-').toLowerCase()+'.json';a.click();showToast('⬇ Skin exportován.');}
function resetSkin(){if(!currentId)return;if(!confirm('Zahodit neuložené změny tohoto skinu?'))return;renderEditor();updatePreview();showToast('↺ Změny zahozeny.');}

/* brand color presets (stored in localStorage) */
function getPresets(){try{return JSON.parse(localStorage.getItem('cf_brand_colors')||'[]');}catch(e){return[];}}
function renderSwatches(){
  const el=document.getElementById('brandSwatches');if(!el)return;
  const presets=getPresets();
  el.innerHTML=presets.map(c=>`<span title="${c} — klik kopíruje" onclick="copyHex('${c}')" style="width:22px;height:22px;border-radius:5px;background:${c};border:1px solid rgba(0,0,0,.15);cursor:pointer;display:inline-block;position:relative;"><span onclick="event.stopPropagation();removePreset('${c}')" style="position:absolute;top:-6px;right:-6px;background:#fff;border:1px solid var(--border);border-radius:50%;width:13px;height:13px;line-height:11px;text-align:center;font-size:9px;color:var(--danger);">×</span></span>`).join('')
    +`<button class="btn btn-sm" style="background:var(--surface2);border:1px solid var(--border);" onclick="addPreset()">+ uložit aktuální</button>`;
}
function addPreset(){const p=getPresets();[g('f-primaryColor'),g('f-accentColor')].forEach(c=>{if(c&&!p.includes(c))p.push(c);});localStorage.setItem('cf_brand_colors',JSON.stringify(p.slice(0,12)));renderSwatches();showToast('🎨 Barva uložena do palety.');}

function dupeSkin(id){const src=skins.find(s=>s.id===id);if(!src)return;const c=JSON.parse(JSON.stringify(src));c.id='skin_'+Date.now();c.name=src.name+' (kopie)';skins.push(c);saveState();selectSkin(c.id);}

function renderMenuItems(items){const el=document.getElementById('menuItemsList');if(!el)return;el.innerHTML=items.map((it,i)=>`<div class="menu-item"><input type="text" placeholder="Label" value="${esc(it.label)}" oninput="liveUpdate()" data-mi="${i}" data-field="label"><input type="url" placeholder="URL" value="${esc(it.url)}" oninput="liveUpdate()" data-mi="${i}" data-field="url"><button class="icon-btn del" onclick="removeMenuItem(${i})">✕</button></div>`).join('');}
function addMenuItem(){const s=skins.find(x=>x.id===currentId);if(!s)return;if(!s.menu)s.menu={enabled:true,items:[]};s.menu.items.push({label:'NOVÁ',url:'https://'});saveState();renderMenuItems(s.menu.items);liveUpdate();}
function removeMenuItem(i){const s=skins.find(x=>x.id===currentId);if(!s?.menu?.items)return;s.menu.items.splice(i,1);saveState();renderMenuItems(s.menu.items);liveUpdate();}

/* ---------- LOGO DROP ---------- */
function initLogoDrop(){
  const drop=document.getElementById('logoDrop'),input=document.getElementById('logoFile');if(!drop)return;
  const prev=document.getElementById('logoPrev');
  const cur=document.getElementById('f-logoUrl').value;
  if(cur){prev.src=cur;prev.style.display='block';}
  drop.onclick=()=>input.click();
  input.onchange=e=>{if(e.target.files[0])readLogo(e.target.files[0]);};
  ['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.add('drag');}));
  ['dragleave','drop'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.classList.remove('drag');}));
  drop.addEventListener('drop',e=>{if(e.dataTransfer.files[0])readLogo(e.dataTransfer.files[0]);});
}
function readLogo(file){const r=new FileReader();r.onload=e=>{document.getElementById('f-logoUrl').value=e.target.result;const p=document.getElementById('logoPrev');p.src=e.target.result;p.style.display='block';liveUpdate();showToast('🖼 Logo nahráno (base64). Pro produkci doporučuji nahrát na hosting a vložit URL.');};r.readAsDataURL(file);}

    styles:{primaryColor:g('f-primaryColor'),accentColor:g('f-accentColor'),fontFamily:g('f-fontFamily'),nameSize:+g('f-nameSize')||16,nameBold:gc('f-nameBold'),nameUppercase:gc('f-nameUppercase'),nameColor:g('f-nameColor'),titleSize:+g('f-titleSize')||14,titleItalic:gc('f-titleItalic'),titleColor:g('f-titleColor'),contactSize:+g('f-contactSize')||14,contactColor:g('f-contactColor'),dividerColor:g('f-dividerColor'),dividerWidth:+g('f-dividerWidth')||0,separatorColor:skin.styles?.separatorColor||'#bfc0c5',cardHeaderBg:skin.styles?.cardHeaderBg||g('f-primaryColor'),cardHeaderTextColor:skin.styles?.cardHeaderTextColor||'#ffffff',cardBodyBg:skin.styles?.cardBodyBg||'#f8fafc',borderColor:skin.styles?.borderColor||'',darkBg:skin.styles?.darkBg||'',photoSize:+g('f-photoSize')||64,photoRound:gc('f-photoRound')},
    company:{logoUrl:g('f-logoUrl'),logoWidth:+g('f-logoWidth')||200,logoLink:g('f-logoLink'),logoInvert:gc('f-logoInvert'),websiteUrl:g('f-websiteUrl'),websiteLabel:g('f-websiteLabel'),phoneIconUrl:g('f-phoneIconUrl'),emailIconUrl:g('f-emailIconUrl'),webIconUrl:g('f-webIconUrl')},
    blocks:{name:gc('f-bl-name'),pronouns:gc('f-bl-pronouns'),title:gc('f-bl-title'),department:gc('f-bl-department'),divider:gc('f-bl-divider'),logo:gc('f-bl-logo'),phone:gc('f-bl-phone'),mobile:gc('f-bl-mobile'),email:gc('f-bl-email'),web:gc('f-bl-web'),address:gc('f-bl-address'),menu:gc('f-bl-menu'),photo:gc('f-bl-photo'),social:gc('f-bl-social'),qr:gc('f-bl-qr')},
    menu:{enabled:gc('f-menuEnabled'),items:menuItems.filter(Boolean)},

/* ---------- VALIDATION ---------- */
function validateCurrent(){
  const s=getFormSkin();if(!s)return;
  const issues=[];
  if(!s.name||s.name==='Nový skin')issues.push('Skin nemá vlastní název.');
  if(s.blocks.logo!==false&&!s.company.logoUrl)issues.push('Logo je zapnuté, ale chybí URL loga.');
  [['logoUrl','URL loga'],['websiteUrl','URL webu'],['logoLink','Link loga']].forEach(([k,n])=>{const val=s.company[k];if(val&&!/^https?:\/\//i.test(val)&&!/^data:/i.test(val))issues.push(`${n} není platná URL (chybí https://).`);});
  if(s.banner.enabled&&!s.banner.imageUrl)issues.push('Banner je zapnutý, ale chybí obrázek.');
  if(s.banner.startDate&&s.banner.endDate&&s.banner.startDate>s.banner.endDate)issues.push('Banner: „Platí od" je po „Platí do".');
  if(s.social.enabled&&!s.social.platforms.length)issues.push('Sociální sítě jsou zapnuté, ale není vybrána žádná.');
  if(s.qr.enabled)issues.push('QR kód: ověřte zobrazení v klasickém Outlooku (base64 obrázky).');
  if((s.company.logoWidth||0)>600)issues.push('Logo je širší než 600px — na mobilu se může ořezat.');
  if(s.banner.enabled&&(s.banner.width||0)>600)issues.push('Banner je širší než 600px — na mobilu se může ořezat.');
  // contrast check (simple)
  if(s.styles.darkBg&&isLight(s.styles.darkBg)&&isLight(s.styles.nameColor))issues.push('Nízký kontrast: světlé jméno na světlém pozadí.');
  const bar=document.getElementById('valbar');
  if(!issues.length){bar.className='valbar ok';bar.innerHTML='✓ Skin je v pořádku, žádné problémy.';}
  else{bar.className='valbar warn';bar.innerHTML='⚠️ Nalezeno '+issues.length+' upozornění:<ul>'+issues.map(i=>`<li>${i}</li>`).join('')+'</ul>';}
  showPane('preview');
}
function isLight(hex){if(!hex||hex[0]!=='#')return false;const r=parseInt(hex.substr(1,2),16),g_=parseInt(hex.substr(3,2),16),b=parseInt(hex.substr(5,2),16);return (0.299*r+0.587*g_+0.114*b)>160;}

/* ---------- SAVE / EXPORT / IMPORT ---------- */
function saveSkin(){const s=getFormSkin();if(!s)return;const i=skins.findIndex(x=>x.id===currentId);if(i>=0)skins[i]=s;saveState();renderSkinList();showToast('✓ Skin uložen!');}
function exportSkins(){const s=getFormSkin();if(s){const i=skins.findIndex(x=>x.id===currentId);if(i>=0)skins[i]=s;saveState();}const blob=new Blob([JSON.stringify(skins,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='skins.json';a.click();showToast('✓ skins.json stažen! Nahrajte ho na hosting.');}
function importSkins(input){const f=input.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!Array.isArray(d))throw 0;skins=d;saveState();currentId=skins[0]?.id||null;renderAll();showToast('✓ Načteno skinů: '+skins.length);}catch(err){alert('Chybný formát.');}};r.readAsText(f);input.value='';}

/* ---------- UTILS ---------- */
function toggleAcc(h){h.classList.toggle('open');h.nextElementSibling.classList.toggle('open');}
function showPane(name){document.querySelectorAll('.ptab').forEach((t,i)=>t.classList.toggle('active',['preview','code'][i]===name));document.getElementById('panePreview').classList.toggle('active',name==='preview');document.getElementById('paneCode').classList.toggle('active',name==='code');}
function copyCode(){navigator.clipboard.writeText(document.getElementById('codeOut').textContent).then(()=>showToast('📋 Zkopírováno!'));}
function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2800);}
function esc(s){return(s==null?'':String(s)).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function renderAll(){renderSkinList();renderEditor();updatePreview();}

loadState();
</script>
</body>
</html>
